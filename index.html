<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sora Quest VR Game</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }

    #hud {
      position: fixed;
      left: 10px;
      right: 10px;
      top: 10px;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      pointer-events: none;
      color: #fff;
    }

    .panel {
      background: rgba(0, 0, 0, 0.62);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 16px;
      padding: 10px 12px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
    }

    #topInfo {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 13px;
      line-height: 1.5;
    }

    #quest {
      font-size: 13px;
      line-height: 1.55;
    }

    #quest strong {
      color: #ffe066;
    }

    #message {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 25;
      transform: translate(-50%, -50%);
      width: min(520px, calc(100vw - 28px));
      background: rgba(0,0,0,0.78);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      padding: 18px 16px;
      text-align: center;
      box-shadow: 0 18px 70px rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      display: none;
      pointer-events: auto;
    }

    #message h1 {
      margin: 0 0 8px;
      font-size: 24px;
      color: #ffe066;
    }

    #message p {
      margin: 0 0 14px;
      line-height: 1.65;
      font-size: 14px;
      color: rgba(255,255,255,0.86);
    }

    #message button {
      width: 100%;
      max-width: 280px;
      border: none;
      border-radius: 999px;
      padding: 13px 18px;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, #34a7ff, #7c5cff);
      cursor: pointer;
      touch-action: manipulation;
    }

    #controls {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      pointer-events: auto;
    }

    .controlBtn {
      border: none;
      border-radius: 15px;
      padding: 13px 8px;
      min-height: 48px;
      font-size: 15px;
      font-weight: 900;
      color: white;
      background: rgba(60, 140, 255, 0.86);
      box-shadow: 0 6px 18px rgba(0,0,0,0.3);
      touch-action: manipulation;
      user-select: none;
    }

    .controlBtn:active {
      transform: scale(0.96);
      background: rgba(255, 174, 54, 0.95);
    }

    #jumpBtn {
      background: rgba(255, 174, 54, 0.9);
    }

    #openBtn {
      background: rgba(124, 92, 255, 0.9);
    }

    #runBtn {
      background: rgba(30, 190, 130, 0.9);
    }

    #crosshair {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 15;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 50%;
      box-shadow: 0 0 12px rgba(255,255,255,0.8);
      pointer-events: none;
    }

    #crosshair::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4px;
      height: 4px;
      transform: translate(-50%, -50%);
      background: #ffe066;
      border-radius: 50%;
    }

    .hidden {
      display: none !important;
    }

    @media (min-width: 900px) {
      #controls {
        width: 520px;
        left: 50%;
        right: auto;
        transform: translateX(-50%);
      }

      #hud {
        width: 520px;
        left: 10px;
        right: auto;
      }
    }
  </style>
</head>

<body>
  <div id="hud">
    <div id="topInfo">
      <div class="panel">
        HP：<span id="hpText">❤️❤️❤️</span><br>
        宝石：<span id="gemText">0 / 6</span>
      </div>
      <div class="panel">
        鍵：<span id="keyText">なし</span><br>
        残り時間：<span id="timeText">120</span>秒
      </div>
    </div>

    <div id="quest" class="panel">
      <strong>ミッション：</strong>
      森の中の宝石を6個集めて、金の鍵を取り、奥の宝箱を開けよう。
    </div>
  </div>

  <div id="crosshair"></div>

  <div id="message">
    <h1 id="messageTitle">Sora Quest VR</h1>
    <p id="messageBody">
      宝石を集めて、敵を避けて、宝箱を開けよう。
    </p>
    <button id="messageBtn">スタート</button>
  </div>

  <div id="controls">
    <button class="controlBtn" id="leftBtn">左</button>
    <button class="controlBtn" id="forwardBtn">前へ</button>
    <button class="controlBtn" id="rightBtn">右</button>
    <button class="controlBtn" id="backBtn">後ろ</button>
    <button class="controlBtn" id="jumpBtn">ジャンプ</button>
    <button class="controlBtn" id="openBtn">開ける</button>
    <button class="controlBtn" id="runBtn">ダッシュ</button>
    <button class="controlBtn" id="restartBtn">やり直し</button>
    <button class="controlBtn" id="soundBtn">音ON</button>
  </div>

  <a-scene
    id="scene"
    background="color: #89d8ff"
    renderer="antialias: true; colorManagement: true;"
    vr-mode-ui="enabled: true"
  >
    <a-assets>
    </a-assets>

    <!-- 光 -->
    <a-entity light="type: ambient; intensity: 0.72; color: #ffffff"></a-entity>
    <a-entity light="type: directional; intensity: 1.2; color: #fff4cc" position="4 8 3"></a-entity>
    <a-entity light="type: point; intensity: 0.9; distance: 18; color: #7be8ff" position="0 4 -12"></a-entity>

    <!-- 空 -->
    <a-sky color="#8fd8ff"></a-sky>

    <!-- プレイヤー -->
    <a-entity id="player" position="0 1.6 8">
      <a-entity
        id="camera"
        camera
        look-controls="touchEnabled: true; mouseEnabled: true; pointerLockEnabled: false"
      ></a-entity>
    </a-entity>

    <!-- 地面 -->
    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="90"
      height="90"
      color="#5ebf70"
      roughness="1"
    ></a-plane>

    <!-- 道 -->
    <a-plane
      position="0 0.012 -4"
      rotation="-90 0 0"
      width="5"
      height="42"
      color="#d8b76a"
    ></a-plane>

    <!-- スタート看板 -->
    <a-entity position="0 1.45 4">
      <a-plane width="5.4" height="1.6" color="#1d2530" opacity="0.88"></a-plane>
      <a-text
        value="SORA QUEST"
        position="0 0.35 0.03"
        align="center"
        color="#ffe066"
        width="5"
      ></a-text>
      <a-text
        value="Collect 6 crystals, get the key, open the treasure!"
        position="0 -0.16 0.03"
        align="center"
        color="#ffffff"
        width="4.8"
      ></a-text>
    </a-entity>

    <!-- 光るゲート -->
    <a-torus
      id="gate"
      position="0 2.1 -11"
      radius="2.1"
      radius-tubular="0.08"
      color="#5ad7ff"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 5200; easing: linear;"
    ></a-torus>

    <a-text
      value="CRYSTAL FOREST"
      position="0 4.35 -11"
      align="center"
      color="#ffffff"
      width="5"
    ></a-text>

    <!-- 宝箱 -->
    <a-entity id="treasure" position="0 0 -24">
      <a-box
        id="chestBase"
        position="0 0.35 0"
        scale="1.8 0.72 1.08"
        color="#8B4513"
      ></a-box>

      <a-box
        id="chestLid"
        position="0 0.88 0"
        scale="1.92 0.36 1.14"
        color="#B06A2B"
      ></a-box>

      <a-box
        position="0 1.02 -0.60"
        scale="2.05 0.12 0.08"
        color="#FFD75A"
      ></a-box>

      <a-box
        position="0 0.45 -0.60"
        scale="2.05 0.12 0.08"
        color="#FFD75A"
      ></a-box>

      <a-box
        position="0 0.64 -0.67"
        scale="0.28 0.34 0.08"
        color="#222222"
      ></a-box>

      <a-sphere
        id="treasureLight"
        position="0 1.65 0"
        radius="0.25"
        color="#fff176"
        visible="false"
        animation="property: position; from: 0 1.45 0; to: 0 2.25 0; dir: alternate; loop: true; dur: 900; easing: easeInOutSine;"
      ></a-sphere>

      <a-ring
        id="treasureRing"
        position="0 1.65 0"
        rotation="90 0 0"
        radius-inner="0.32"
        radius-outer="0.40"
        color="#ffffff"
        visible="false"
        animation="property: rotation; to: 90 0 360; loop: true; dur: 1300; easing: linear;"
      ></a-ring>

      <a-text
        value="TREASURE"
        position="0 1.85 -0.8"
        align="center"
        color="#ffe066"
        width="3.8"
      ></a-text>
    </a-entity>

    <!-- ここにJSで木・宝石・敵・鍵を生成 -->
    <a-entity id="world"></a-entity>
  </a-scene>

  <script>
    const THREE_REF = AFRAME.THREE;

    const player = document.getElementById("player");
    const camera = document.getElementById("camera");
    const world = document.getElementById("world");

    const hpText = document.getElementById("hpText");
    const gemText = document.getElementById("gemText");
    const keyText = document.getElementById("keyText");
    const timeText = document.getElementById("timeText");
    const quest = document.getElementById("quest");

    const message = document.getElementById("message");
    const messageTitle = document.getElementById("messageTitle");
    const messageBody = document.getElementById("messageBody");
    const messageBtn = document.getElementById("messageBtn");

    const chestLid = document.getElementById("chestLid");
    const treasureLight = document.getElementById("treasureLight");
    const treasureRing = document.getElementById("treasureRing");

    const forwardBtn = document.getElementById("forwardBtn");
    const backBtn = document.getElementById("backBtn");
    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");
    const jumpBtn = document.getElementById("jumpBtn");
    const openBtn = document.getElementById("openBtn");
    const runBtn = document.getElementById("runBtn");
    const restartBtn = document.getElementById("restartBtn");
    const soundBtn = document.getElementById("soundBtn");

    let audioCtx = null;
    let soundEnabled = false;

    let state;
    let gems = [];
    let enemies = [];
    let keyEntity = null;

    let keys = {};
    let moving = {
      forward: false,
      back: false,
      left: false,
      right: false,
      run: false
    };

    let lastDamageTime = 0;
    let lastTimeTick = performance.now();
    let lastFrame = performance.now();

    function createInitialState() {
      return {
        hp: 3,
        gems: 0,
        totalGems: 6,
        hasKey: false,
        time: 120,
        gameStarted: false,
        gameOver: false,
        gameClear: false,
        chestOpen: false,
        yVelocity: 0,
        onGround: true
      };
    }

    function showMessage(title, body, buttonText, onClick) {
      messageTitle.textContent = title;
      messageBody.innerHTML = body;
      messageBtn.textContent = buttonText;
      message.style.display = "block";
      messageBtn.onclick = onClick;
    }

    function hideMessage() {
      message.style.display = "none";
    }

    function enableAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }

      soundEnabled = true;
      soundBtn.textContent = "音ON";
      playTone(660, 0.08, "sine", 0.08);
      setTimeout(() => playTone(990, 0.08, "sine", 0.08), 80);
    }

    function playTone(freq, duration, type = "sine", volume = 0.08) {
      if (!soundEnabled || !audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = type;
      osc.frequency.value = freq;

      gain.gain.setValueAtTime(volume, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    function updateHUD() {
      hpText.textContent = "❤️".repeat(state.hp) + "♡".repeat(3 - state.hp);
      gemText.textContent = state.gems + " / " + state.totalGems;
      keyText.textContent = state.hasKey ? "あり 🔑" : "なし";
      timeText.textContent = state.time;

      if (state.gameClear) {
        quest.innerHTML = "<strong>クリア！</strong> Soraの宝箱を開けた！";
      } else if (state.gameOver) {
        quest.innerHTML = "<strong>ゲームオーバー。</strong> やり直してもう一度挑戦しよう。";
      } else if (state.gems < state.totalGems) {
        quest.innerHTML = "<strong>ミッション：</strong> 宝石を6個集めよう。敵に近づきすぎるとHPが減る。";
      } else if (!state.hasKey) {
        quest.innerHTML = "<strong>ミッション：</strong> 金の鍵が出現した！鍵を取ろう。";
      } else {
        quest.innerHTML = "<strong>ミッション：</strong> 奥の宝箱に近づいて「開ける」を押そう。";
      }
    }

    function clearWorld() {
      while (world.firstChild) {
        world.removeChild(world.firstChild);
      }

      gems = [];
      enemies = [];
      keyEntity = null;
    }

    function makeEntity(tag, attrs, parent = world) {
      const el = document.createElement(tag);

      Object.keys(attrs).forEach((key) => {
        el.setAttribute(key, attrs[key]);
      });

      parent.appendChild(el);
      return el;
    }

    function buildWorld() {
      clearWorld();

      const treePositions = [
        [-6, -1], [6, -2], [-7, -6], [7, -7], [-5, -11], [5, -12],
        [-8, -16], [8, -16], [-4, -21], [4, -20], [-10, 3], [10, 2],
        [-12, -8], [12, -10], [-13, -20], [13, -22], [-2, -30], [2, -31]
      ];

      treePositions.forEach((p, i) => {
        const x = p[0];
        const z = p[1];
        const height = 2 + (i % 3) * 0.35;

        makeEntity("a-cylinder", {
          position: `${x} ${height / 2} ${z}`,
          radius: "0.24",
          height: `${height}`,
          color: "#7a4a28"
        });

        makeEntity("a-cone", {
          position: `${x} ${height + 0.9} ${z}`,
          "radius-bottom": `${1.05 + (i % 4) * 0.13}`,
          height: "2.2",
          color: i % 2 === 0 ? "#226b39" : "#2d7a44"
        });
      });

      const rockPositions = [
        [-3.4, 1.2], [3.4, -4.5], [-4.2, -8.2], [4.8, -14.4],
        [-2.6, -18.7], [3.2, -27.2], [-6.2, -25.5]
      ];

      rockPositions.forEach((p, i) => {
        makeEntity("a-sphere", {
          position: `${p[0]} 0.25 ${p[1]}`,
          radius: `${0.35 + (i % 3) * 0.14}`,
          scale: "1.3 0.55 1",
          color: "#6d767f"
        });
      });

      const gemPositions = [
        [-2.2, -2.5],
        [2.4, -6.4],
        [-3.2, -10.5],
        [3.1, -15.5],
        [-2.6, -19.2],
        [2.2, -22.4]
      ];

      gemPositions.forEach((p, i) => {
        const gem = makeEntity("a-entity", {
          position: `${p[0]} 0.75 ${p[1]}`
        });

        const body = makeEntity("a-sphere", {
          radius: "0.22",
          color: i % 2 === 0 ? "#7be8ff" : "#c58cff",
          animation: "property: position; from: 0 0 0; to: 0 0.25 0; dir: alternate; loop: true; dur: 850; easing: easeInOutSine;"
        }, gem);

        makeEntity("a-ring", {
          position: "0 -0.25 0",
          rotation: "90 0 0",
          "radius-inner": "0.32",
          "radius-outer": "0.38",
          color: "#ffffff",
          opacity: "0.85",
          animation: "property: rotation; to: 90 0 360; loop: true; dur: 1500; easing: linear;"
        }, gem);

        gem.dataset.collected = "false";
        gems.push(gem);
      });

      keyEntity = makeEntity("a-entity", {
        id: "goldKey",
        position: "0 1 -12",
        visible: "false"
      });

      makeEntity("a-torus", {
        position: "0 0.1 0",
        rotation: "90 0 0",
        radius: "0.25",
        "radius-tubular": "0.045",
        color: "#ffd75a",
        animation: "property: rotation; to: 90 360 0; loop: true; dur: 1400; easing: linear;"
      }, keyEntity);

      makeEntity("a-box", {
        position: "0.28 0.1 0",
        scale: "0.46 0.08 0.08",
        color: "#ffd75a"
      }, keyEntity);

      makeEntity("a-box", {
        position: "0.50 0.1 0.10",
        scale: "0.08 0.18 0.08",
        color: "#ffd75a"
      }, keyEntity);

      makeEntity("a-box", {
        position: "0.62 0.1 0.10",
        scale: "0.08 0.18 0.08",
        color: "#ffd75a"
      }, keyEntity);

      const enemyData = [
        { x: -4, z: -6, minX: -5.6, maxX: -1.4, speed: 1.3 },
        { x: 4, z: -12, minX: 1.5, maxX: 5.8, speed: 1.6 },
        { x: -4, z: -18, minX: -6.2, maxX: -1.2, speed: 1.45 },
        { x: 4, z: -23, minX: 1.2, maxX: 6.4, speed: 1.7 }
      ];

      enemyData.forEach((e, i) => {
        const enemy = makeEntity("a-entity", {
          position: `${e.x} 0.55 ${e.z}`
        });

        makeEntity("a-sphere", {
          radius: "0.45",
          color: "#7c2cff",
          scale: "1 0.75 1",
          animation: "property: scale; from: 1 0.72 1; to: 1.08 0.88 1.08; dir: alternate; loop: true; dur: 520; easing: easeInOutSine;"
        }, enemy);

        makeEntity("a-sphere", {
          position: "-0.16 0.16 -0.35",
          radius: "0.065",
          color: "#ffffff"
        }, enemy);

        makeEntity("a-sphere", {
          position: "0.16 0.16 -0.35",
          radius: "0.065",
          color: "#ffffff"
        }, enemy);

        makeEntity("a-sphere", {
          position: "-0.16 0.16 -0.405",
          radius: "0.03",
          color: "#111111"
        }, enemy);

        makeEntity("a-sphere", {
          position: "0.16 0.16 -0.405",
          radius: "0.03",
          color: "#111111"
        }, enemy);

        makeEntity("a-ring", {
          position: "0 -0.45 0",
          rotation: "90 0 0",
          "radius-inner": "0.48",
          "radius-outer": "0.56",
          color: "#ff5cff",
          opacity: "0.55"
        }, enemy);

        enemy.dataset.minX = e.minX;
        enemy.dataset.maxX = e.maxX;
        enemy.dataset.speed = e.speed;
        enemy.dataset.dir = i % 2 === 0 ? "1" : "-1";

        enemies.push(enemy);
      });

      const torchPositions = [
        [-2.8, -10.5], [2.8, -10.5], [-2.8, -23], [2.8, -23]
      ];

      torchPositions.forEach((p) => {
        makeEntity("a-cylinder", {
          position: `${p[0]} 0.8 ${p[1]}`,
          radius: "0.08",
          height: "1.5",
          color: "#5a3318"
        });

        makeEntity("a-sphere", {
          position: `${p[0]} 1.65 ${p[1]}`,
          radius: "0.18",
          color: "#ffb02e",
          animation: "property: scale; from: 1 1 1; to: 1.25 1.25 1.25; dir: alternate; loop: true; dur: 420; easing: easeInOutSine;"
        });

        makeEntity("a-entity", {
          light: "type: point; intensity: 0.75; distance: 7; color: #ffb02e",
          position: `${p[0]} 1.6 ${p[1]}`
        });
      });
    }

    function resetGame() {
      state = createInitialState();

      player.setAttribute("position", "0 1.6 8");

      chestLid.removeAttribute("animation");
      chestLid.setAttribute("rotation", "0 0 0");
      treasureLight.setAttribute("visible", "false");
      treasureRing.setAttribute("visible", "false");

      buildWorld();
      updateHUD();

      lastDamageTime = 0;
      lastTimeTick = performance.now();
      lastFrame = performance.now();

      showMessage(
        "Sora Quest VR",
        "宝石を6個集めて、金の鍵を取り、奥の宝箱を開けよう。<br><br>PC：WASD / 矢印キーで移動、マウスで視点変更。<br>スマホ：画面ドラッグで視点変更、下のボタンで移動。",
        "スタート",
        () => {
          hideMessage();
          state.gameStarted = true;
          enableAudio();
          updateHUD();
        }
      );
    }

    function getPosition(el) {
      return el.getAttribute("position");
    }

    function setPosition(el, pos) {
      el.setAttribute("position", pos);
    }

    function distanceXZ(a, b) {
      const dx = a.x - b.x;
      const dz = a.z - b.z;
      return Math.sqrt(dx * dx + dz * dz);
    }

    function getYaw() {
      const rot = camera.getAttribute("rotation");
      return THREE_REF.MathUtils.degToRad(rot.y);
    }

    function movePlayer(direction, amount) {
      if (!state.gameStarted || state.gameOver || state.gameClear) return;

      const pos = getPosition(player);
      const yaw = getYaw();

      let dx = 0;
      let dz = 0;

      if (direction === "forward") {
        dx = -Math.sin(yaw) * amount;
        dz = -Math.cos(yaw) * amount;
      }

      if (direction === "back") {
        dx = Math.sin(yaw) * amount;
        dz = Math.cos(yaw) * amount;
      }

      if (direction === "left") {
        dx = -Math.cos(yaw) * amount;
        dz = Math.sin(yaw) * amount;
      }

      if (direction === "right") {
        dx = Math.cos(yaw) * amount;
        dz = -Math.sin(yaw) * amount;
      }

      let nx = pos.x + dx;
      let nz = pos.z + dz;

      nx = Math.max(-18, Math.min(18, nx));
      nz = Math.max(-32, Math.min(10, nz));

      setPosition(player, {
        x: nx,
        y: pos.y,
        z: nz
      });
    }

    function jump() {
      if (!state.gameStarted || state.gameOver || state.gameClear) return;
      if (!state.onGround) return;

      state.yVelocity = 0.16;
      state.onGround = false;
      playTone(520, 0.08, "triangle", 0.08);
    }

    function updateJump() {
      const pos = getPosition(player);

      if (!state.onGround) {
        state.yVelocity -= 0.009;

        let ny = pos.y + state.yVelocity;

        if (ny <= 1.6) {
          ny = 1.6;
          state.yVelocity = 0;
          state.onGround = true;
        }

        setPosition(player, {
          x: pos.x,
          y: ny,
          z: pos.z
        });
      }
    }

    function updateTimer(now) {
      if (!state.gameStarted || state.gameOver || state.gameClear) return;

      if (now - lastTimeTick >= 1000) {
        lastTimeTick = now;
        state.time -= 1;

        if (state.time <= 0) {
          state.time = 0;
          endGame(false, "時間切れ！", "森の探索に時間がかかりすぎた。もう一度挑戦しよう。");
        }

        updateHUD();
      }
    }

    function updateEnemies(delta) {
      enemies.forEach((enemy) => {
        const pos = getPosition(enemy);
        const minX = Number(enemy.dataset.minX);
        const maxX = Number(enemy.dataset.maxX);
        const speed = Number(enemy.dataset.speed);
        let dir = Number(enemy.dataset.dir);

        let nx = pos.x + dir * speed * delta;

        if (nx > maxX) {
          nx = maxX;
          dir = -1;
        }

        if (nx < minX) {
          nx = minX;
          dir = 1;
        }

        enemy.dataset.dir = dir;
        setPosition(enemy, {
          x: nx,
          y: pos.y + Math.sin(performance.now() * 0.004) * 0.004,
          z: pos.z
        });
      });
    }

    function checkGemCollection() {
      const p = getPosition(player);

      gems.forEach((gem) => {
        if (gem.dataset.collected === "true") return;

        const g = getPosition(gem);
        const d = distanceXZ(p, g);

        if (d < 1.1) {
          gem.dataset.collected = "true";
          gem.setAttribute("visible", "false");
          state.gems += 1;

          playTone(880, 0.08, "sine", 0.08);
          setTimeout(() => playTone(1180, 0.08, "sine", 0.07), 70);

          if (state.gems >= state.totalGems) {
            keyEntity.setAttribute("visible", "true");
            showToast("金の鍵が出現した！");
            playTone(660, 0.1, "triangle", 0.08);
            setTimeout(() => playTone(990, 0.1, "triangle", 0.08), 120);
          } else {
            showToast("宝石を見つけた！ " + state.gems + " / " + state.totalGems);
          }

          updateHUD();
        }
      });
    }

    function checkKeyCollection() {
      if (state.hasKey) return;
      if (state.gems < state.totalGems) return;
      if (!keyEntity) return;

      const p = getPosition(player);
      const k = getPosition(keyEntity);

      if (distanceXZ(p, k) < 1.15) {
        state.hasKey = true;
        keyEntity.setAttribute("visible", "false");

        showToast("金の鍵を手に入れた！宝箱へ向かおう。");
        playTone(523, 0.1, "sine", 0.08);
        setTimeout(() => playTone(784, 0.1, "sine", 0.08), 100);
        setTimeout(() => playTone(1046, 0.12, "sine", 0.08), 200);

        updateHUD();
      }
    }

    function checkEnemyDamage() {
      const now = performance.now();
      if (now - lastDamageTime < 1200) return;

      const p = getPosition(player);

      for (const enemy of enemies) {
        const e = getPosition(enemy);

        if (distanceXZ(p, e) < 1.05) {
          lastDamageTime = now;
          state.hp -= 1;

          showToast("シャドウスライムに触れた！ HP -1");
          playTone(180, 0.14, "sawtooth", 0.06);
          playTone(120, 0.18, "sawtooth", 0.05);

          const pos = getPosition(player);
          setPosition(player, {
            x: pos.x,
            y: pos.y,
            z: pos.z + 1.2
          });

          if (state.hp <= 0) {
            state.hp = 0;
            updateHUD();
            endGame(false, "ゲームオーバー", "HPがなくなった。敵の動きを見て、タイミングよく進もう。");
          }

          updateHUD();
          break;
        }
      }
    }

    function openTreasure() {
      if (!state.gameStarted || state.gameOver || state.gameClear) return;

      const p = getPosition(player);
      const treasurePos = { x: 0, y: 0, z: -24 };

      if (distanceXZ(p, treasurePos) > 3.2) {
        showToast("宝箱が遠い。もう少し近づこう。");
        return;
      }

      if (state.gems < state.totalGems) {
        showToast("宝石がまだ足りない。6個集めよう。");
        return;
      }

      if (!state.hasKey) {
        showToast("鍵がない。金の鍵を探そう。");
        return;
      }

      if (state.chestOpen) {
        showToast("宝箱はもう開いている。");
        return;
      }

      state.chestOpen = true;
      state.gameClear = true;

      chestLid.setAttribute("animation", {
        property: "rotation",
        to: "-62 0 0",
        dur: 700,
        easing: "easeOutQuad"
      });

      treasureLight.setAttribute("visible", "true");
      treasureRing.setAttribute("visible", "true");

      playVictorySound();

      setTimeout(() => {
        endGame(true, "クリア！", "Soraの星を発見！<br>宝石を集め、敵を避けて、宝箱を開けた。");
      }, 650);

      updateHUD();
    }

    function playVictorySound() {
      playTone(523, 0.12, "sine", 0.08);
      setTimeout(() => playTone(659, 0.12, "sine", 0.08), 120);
      setTimeout(() => playTone(784, 0.12, "sine", 0.08), 240);
      setTimeout(() => playTone(1046, 0.22, "sine", 0.08), 360);
    }

    let toastTimer = null;

    function showToast(text) {
      quest.innerHTML = "<strong>INFO：</strong> " + text;

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        updateHUD();
      }, 1700);
    }

    function endGame(clear, title, body) {
      state.gameStarted = false;
      state.gameOver = !clear;
      state.gameClear = clear;

      updateHUD();

      showMessage(
        title,
        body + "<br><br>宝石：" + state.gems + " / " + state.totalGems + "　残り時間：" + state.time + "秒",
        "もう一度遊ぶ",
        () => {
          hideMessage();
          resetGame();
        }
      );
    }

    function bindHoldButton(btn, key) {
      btn.addEventListener("mousedown", () => moving[key] = true);
      btn.addEventListener("mouseup", () => moving[key] = false);
      btn.addEventListener("mouseleave", () => moving[key] = false);

      btn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        moving[key] = true;
        enableAudio();
      }, { passive: false });

      btn.addEventListener("touchend", (e) => {
        e.preventDefault();
        moving[key] = false;
      }, { passive: false });

      btn.addEventListener("touchcancel", (e) => {
        e.preventDefault();
        moving[key] = false;
      }, { passive: false });
    }

    bindHoldButton(forwardBtn, "forward");
    bindHoldButton(backBtn, "back");
    bindHoldButton(leftBtn, "left");
    bindHoldButton(rightBtn, "right");
    bindHoldButton(runBtn, "run");

    jumpBtn.addEventListener("click", () => {
      enableAudio();
      jump();
    });

    jumpBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      enableAudio();
      jump();
    }, { passive: false });

    openBtn.addEventListener("click", () => {
      enableAudio();
      openTreasure();
    });

    openBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      enableAudio();
      openTreasure();
    }, { passive: false });

    restartBtn.addEventListener("click", () => {
      enableAudio();
      hideMessage();
      resetGame();
    });

    restartBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      enableAudio();
      hideMessage();
      resetGame();
    }, { passive: false });

    soundBtn.addEventListener("click", enableAudio);
    soundBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      enableAudio();
    }, { passive: false });

    messageBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      if (typeof messageBtn.onclick === "function") {
        messageBtn.onclick();
      }
    }, { passive: false });

    window.addEventListener("keydown", (e) => {
      keys[e.key.toLowerCase()] = true;
      enableAudio();

      if (e.key === " " || e.key.toLowerCase() === "e") {
        e.preventDefault();
      }

      if (e.key === " ") {
        jump();
      }

      if (e.key.toLowerCase() === "e") {
        openTreasure();
      }

      if (e.key.toLowerCase() === "r") {
        hideMessage();
        resetGame();
      }
    });

    window.addEventListener("keyup", (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    function handleKeyboardMovement(delta) {
      if (keys["w"] || keys["arrowup"]) moving.forward = true;
      else if (!forwardBtn.matches(":active")) moving.forward = false;

      if (keys["s"] || keys["arrowdown"]) moving.back = true;
      else if (!backBtn.matches(":active")) moving.back = false;

      if (keys["a"] || keys["arrowleft"]) moving.left = true;
      else if (!leftBtn.matches(":active")) moving.left = false;

      if (keys["d"] || keys["arrowright"]) moving.right = true;
      else if (!rightBtn.matches(":active")) moving.right = false;

      moving.run = moving.run || keys["shift"];
    }

    function updateMovement(delta) {
      if (!state.gameStarted || state.gameOver || state.gameClear) return;

      const baseSpeed = moving.run ? 6.2 : 3.6;
      const amount = baseSpeed * delta;

      if (moving.forward) movePlayer("forward", amount);
      if (moving.back) movePlayer("back", amount);
      if (moving.left) movePlayer("left", amount);
      if (moving.right) movePlayer("right", amount);
    }

    function gameLoop(now) {
      const delta = Math.min((now - lastFrame) / 1000, 0.05);
      lastFrame = now;

      if (state) {
        handleKeyboardMovement(delta);
        updateMovement(delta);
        updateJump();
        updateEnemies(delta);
        updateTimer(now);

        if (state.gameStarted && !state.gameOver && !state.gameClear) {
          checkGemCollection();
          checkKeyCollection();
          checkEnemyDamage();
        }
      }

      requestAnimationFrame(gameLoop);
    }

    resetGame();
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
