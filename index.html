<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sora 本物AR</title>

  <!-- A-Frame：AR.js 3.4.7 と合わせる -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- AR.js：マーカー型AR用 -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.7/aframe/build/aframe-ar.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #fff;
    }

    #startScreen {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(90, 180, 255, 0.28), transparent 36%),
        linear-gradient(180deg, #06101f, #000);
      padding: 22px;
      box-sizing: border-box;
      text-align: center;
    }

    .startCard {
      width: min(430px, 100%);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      padding: 24px 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
      letter-spacing: 0.03em;
    }

    .lead {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.7;
      color: rgba(255,255,255,0.82);
    }

    .note {
      margin-top: 14px;
      font-size: 12px;
      line-height: 1.6;
      color: rgba(255,255,255,0.68);
    }

    button {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 15px 18px;
      font-size: 17px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, #34a7ff, #7c5cff);
      box-shadow: 0 10px 26px rgba(67, 147, 255, 0.42);
      cursor: pointer;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.98);
    }

    #status {
      position: fixed;
      left: 10px;
      right: 10px;
      top: 10px;
      z-index: 9999;
      background: rgba(0,0,0,0.72);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.55;
      color: #fff;
      pointer-events: none;
      display: none;
    }

    #status strong {
      color: #ffe066;
    }

    #markerHelp {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 9999;
      background: rgba(255,255,255,0.92);
      color: #111;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.55;
      text-align: center;
      display: none;
    }

    #markerHelp strong {
      color: #0066cc;
    }

    #arRoot {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>
  <div id="startScreen">
    <div class="startCard">
      <h1>Sora 本物AR</h1>
      <p class="lead">
        カメラを起動して、Hiroマーカーを映すと<br>
        マーカーの上に宝箱と星が出ます。
      </p>

      <button id="startBtn">ARを開始する</button>

      <div class="note">
        ※ 別のスマホ・PC・紙に Hiroマーカーを表示して、<br>
        このスマホのカメラで映してください。<br>
        検索ワード：AR.js Hiro marker
      </div>
    </div>
  </div>

  <div id="status">
    <strong>AR準備中...</strong><br>
    カメラ許可が出たら「許可」を押してください。
  </div>

  <div id="markerHelp">
    <strong>Hiroマーカー</strong>をカメラに映してください。<br>
    認識すると宝箱・星・文字がマーカーの上に出ます。
  </div>

  <div id="arRoot"></div>

  <script>
    const startBtn = document.getElementById("startBtn");
    const startScreen = document.getElementById("startScreen");
    const statusBox = document.getElementById("status");
    const markerHelp = document.getElementById("markerHelp");
    const arRoot = document.getElementById("arRoot");

    let arStarted = false;

    function setStatus(html) {
      statusBox.innerHTML = html;
      statusBox.style.display = "block";
    }

    function startAR() {
      if (arStarted) return;
      arStarted = true;

      startScreen.classList.add("hidden");
      markerHelp.style.display = "block";

      setStatus(
        "<strong>AR起動中...</strong><br>" +
        "カメラ許可が出たら許可してください。<br>" +
        "映像が出たらHiroマーカーに向けてください。"
      );

      arRoot.innerHTML = `
        <a-scene
          embedded
          vr-mode-ui="enabled: false"
          renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
          arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false;"
        >
          <a-marker
            id="hiroMarker"
            preset="hiro"
            emitevents="true"
            smooth="true"
            smooth-count="10"
            smooth-tolerance="0.01"
            smooth-threshold="5"
          >

            <!-- 地面の光る円 -->
            <a-torus
              position="0 0.03 0"
              rotation="90 0 0"
              radius="0.72"
              radius-tubular="0.035"
              color="#4dd8ff"
              animation="property: rotation; to: 90 0 360; loop: true; dur: 2600; easing: linear;"
            ></a-torus>

            <!-- 宝箱っぽい土台 -->
            <a-box
              position="0 0.22 0"
              scale="0.9 0.36 0.55"
              color="#8B4513"
            ></a-box>

            <!-- 宝箱のふた -->
            <a-box
              position="0 0.48 0"
              scale="0.95 0.22 0.6"
              color="#B06A2B"
              animation="property: rotation; from: 0 0 0; to: -18 0 0; dir: alternate; loop: true; dur: 900; easing: easeInOutSine;"
            ></a-box>

            <!-- 金色ライン -->
            <a-box
              position="0 0.55 -0.31"
              scale="1.02 0.08 0.04"
              color="#FFD75A"
            ></a-box>

            <a-box
              position="0 0.24 -0.31"
              scale="1.02 0.07 0.04"
              color="#FFD75A"
            ></a-box>

            <!-- 鍵穴 -->
            <a-box
              position="0 0.36 -0.34"
              scale="0.13 0.18 0.04"
              color="#222"
            ></a-box>

            <!-- 浮かぶ星 -->
            <a-sphere
              position="0 1.12 0"
              radius="0.18"
              color="#fff176"
              animation="property: position; from: 0 1.02 0; to: 0 1.34 0; dir: alternate; loop: true; dur: 850; easing: easeInOutSine;"
            ></a-sphere>

            <a-ring
              position="0 1.12 0"
              rotation="90 0 0"
              radius-inner="0.22"
              radius-outer="0.27"
              color="#ffffff"
              animation="property: rotation; to: 90 0 360; loop: true; dur: 1600; easing: linear;"
            ></a-ring>

            <!-- 文字 -->
            <a-text
              value="SORA TREASURE"
              position="0 0.05 -0.9"
              rotation="-90 0 0"
              align="center"
              width="3.2"
              color="#ffffff"
            ></a-text>

          </a-marker>

          <a-entity camera></a-entity>
        </a-scene>
      `;

      setTimeout(() => {
        const marker = document.getElementById("hiroMarker");

        if (marker) {
          marker.addEventListener("markerFound", () => {
            setStatus(
              "<strong>マーカー発見！</strong><br>" +
              "宝箱が出ていれば成功です。"
            );
            markerHelp.style.display = "none";
          });

          marker.addEventListener("markerLost", () => {
            setStatus(
              "<strong>マーカーを見失いました</strong><br>" +
              "もう一度Hiroマーカーを正面から映してください。"
            );
            markerHelp.style.display = "block";
          });
        }
      }, 1000);
    }

    startBtn.addEventListener("click", startAR);

    startBtn.addEventListener("touchstart", function(e) {
      e.preventDefault();
      startAR();
    }, { passive: false });
  </script>
</body>
</html>
