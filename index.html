<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sora カメラ診断</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #111;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    #camera {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: #000;
      display: block;
    }

    #panel {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.75);
      border-radius: 16px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    #status {
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      max-width: 360px;
      padding: 14px 18px;
      border: none;
      border-radius: 999px;
      background: #4aa3ff;
      color: white;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <video id="camera" autoplay playsinline muted></video>

  <div id="panel">
    <div id="status">
      黒画面の原因を調べます。<br>
      まず「カメラを起動」を押してください。
    </div>
    <button id="startBtn">カメラを起動</button>
  </div>

  <script>
    const video = document.getElementById("camera");
    const statusBox = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");

    async function startCamera() {
      statusBox.innerHTML = "カメラ起動中...";

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        statusBox.innerHTML =
          "このブラウザはカメラ起動に対応していません。<br>" +
          "Safari または Chrome で開いてください。";
        return;
      }

      try {
        let stream;

        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: {
              facingMode: { ideal: "environment" }
            },
            audio: false
          });
        } catch (backCameraError) {
          stream = await navigator.mediaDevices.getUserMedia({
            video: true,
            audio: false
          });
        }

        video.srcObject = stream;

        video.onloadedmetadata = () => {
          video.play();
          statusBox.innerHTML =
            "カメラ起動成功！<br>" +
            "この画面にカメラ映像が出ていれば、GitHub Pagesとカメラ権限はOKです。";
          startBtn.style.display = "none";
        };

      } catch (error) {
        statusBox.innerHTML =
          "カメラ起動失敗。<br><br>" +
          "エラー名：<br>" + error.name + "<br><br>" +
          "内容：<br>" + error.message + "<br><br>" +
          "確認：URLが https:// か、カメラ許可がブロックされていないか見てください。";
      }
    }

    startBtn.addEventListener("click", startCamera);
    startBtn.addEventListener("touchstart", function(e) {
      e.preventDefault();
      startCamera();
    }, { passive: false });
  </script>
</body>
</html>
