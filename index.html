<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>簡単WebAR - Hiroマーカー</title>

  <!-- A-Frame 本体 -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- AR.js：マーカー認識用 -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .info {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      text-align: center;
      pointer-events: none;
    }

    .info strong {
      color: #ffdf5a;
    }
  </style>
</head>

<body>
  <div class="info">
    カメラを許可して、<strong>Hiroマーカー</strong>に向けてください。<br>
    マーカーを認識すると赤い箱が表示されます。
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; precision: medium;"
    arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false;"
  >

    <!-- Hiroマーカー -->
    <a-marker preset="hiro">
      <a-box
        position="0 0.5 0"
        scale="1 1 1"
        color="red"
        animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear;"
      ></a-box>

      <a-text
        value="SORA AR"
        position="-0.8 1.3 0"
        rotation="-90 0 0"
        color="#ffffff"
        align="center"
        width="4"
      ></a-text>
    </a-marker>

    <!-- これがないとカメラ視点が動かない -->
    <a-entity camera></a-entity>

  </a-scene>
</body>
</html>
