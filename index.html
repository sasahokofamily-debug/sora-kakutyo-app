<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Sora Quest VR</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
    }

    #ui {
      position: fixed;
      left: 10px;
      right: 10px;
      top: 10px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.62);
      color: #fff;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.5;
      pointer-events: none;
    }

    #ui strong {
      color: #ffe066;
    }

    #controls {
      position: fixed;
      left: 10px;
      right: 10px;
      bottom: 10px;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      pointer-events: auto;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 8px;
      font-size: 15px;
      font-weight: 800;
      color: white;
      background: rgba(60, 140, 255, 0.86);
      box-shadow: 0 6px 18px rgba(0,0,0,0.3);
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.96);
      background: rgba(255, 174, 54, 0.95);
    }

    #jumpBtn {
      background: rgba(255, 174, 54, 0.88);
    }

    #openBtn {
      background: rgba(124, 92, 255, 0.88);
    }
  </style>
</head>

<body>
  <div id="ui">
    <strong>Sora Quest VR</strong><br>
    PC：WASDで移動、マウスで視点変更。<br>
    スマホ：画面ドラッグで視点変更、下ボタンで移動。宝箱に近づいて「開ける」。
  </div>

  <div id="controls">
    <button id="leftBtn">左</button>
    <button id="forwardBtn">前へ</button>
    <button id="rightBtn">右</button>
    <button id="backBtn">後ろ</button>
    <button id="jumpBtn">ジャンプ</button>
    <button id="openBtn">開ける</button>
  </div>

  <a-scene
    background="color: #87CEEB"
    renderer="antialias: true; colorManagement: true;"
    vr-mode-ui="enabled: true"
  >

    <!-- 空 -->
    <a-sky color="#8fd3ff"></a-sky>

    <!-- 太陽っぽい光 -->
    <a-entity light="type: ambient; intensity: 0.65; color: #ffffff"></a-entity>
    <a-entity light="type: directional; intensity: 1.2; color: #fff4cc" position="3 7 4"></a-entity>

    <!-- プレイヤー -->
    <a-entity id="player" position="0 1.6 5">
      <a-entity
        id="camera"
        camera
        look-controls="touchEnabled: true; mouseEnabled: true; pointerLockEnabled: false"
        wasd-controls="acceleration: 35"
      >
        <a-cursor
          color="#ffffff"
          fuse="false"
          raycaster="objects: .clickable"
        ></a-cursor>
      </a-entity>
    </a-entity>

    <!-- 地面 -->
    <a-plane
      position="0 0 0"
      rotation="-90 0 0"
      width="80"
      height="80"
      color="#5fbf6f"
      roughness="1"
    ></a-plane>

    <!-- 道 -->
    <a-plane
      position="0 0.01 0"
      rotation="-90 0 0"
      width="5"
      height="40"
      color="#d6b46a"
    ></a-plane>

    <!-- 森の木たち -->
    <a-entity id="forest">
      <a-cylinder position="-5 1 -2" radius="0.25" height="2" color="#7a4a28"></a-cylinder>
      <a-cone position="-5 2.5 -2" radius-bottom="1.2" height="2.4" color="#246b38"></a-cone>

      <a-cylinder position="5 1 -1" radius="0.25" height="2" color="#7a4a28"></a-cylinder>
      <a-cone position="5 2.5 -1" radius-bottom="1.2" height="2.4" color="#246b38"></a-cone>

      <a-cylinder position="-6 1 -8" radius="0.25" height="2" color="#7a4a28"></a-cylinder>
      <a-cone position="-6 2.5 -8" radius-bottom="1.3" height="2.5" color="#1f5f34"></a-cone>

      <a-cylinder position="6 1 -9" radius="0.25" height="2" color="#7a4a28"></a-cylinder>
      <a-cone position="6 2.5 -9" radius-bottom="1.3" height="2.5" color="#1f5f34"></a-cone>

      <a-cylinder position="-4 1 -14" radius="0.25" height="2" color="#7a4a28"></a-cylinder>
      <a-cone position="-4 2.5 -14" radius-bottom="1.4" height="2.6" color="#2d7a44"></a-cone>

      <a-cylinder position="4 1 -15" radius="0.25" height="2" color="#7a4a28"></a-cylinder>
      <a-cone position="4 2.5 -15" radius-bottom="1.4" height="2.6" color="#2d7a44"></a-cone>
    </a-entity>

    <!-- ゲート -->
    <a-torus
      position="0 2 -10"
      rotation="0 0 0"
      radius="1.7"
      radius-tubular="0.08"
      color="#5ad7ff"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear;"
    ></a-torus>

    <a-text
      value="SORA QUEST"
      position="0 3.8 -10"
      align="center"
      color="#ffffff"
      width="5"
    ></a-text>

    <!-- 宝箱 -->
    <a-entity id="treasure" class="clickable" position="0 0 -16">
      <a-box
        id="chestBase"
        position="0 0.35 0"
        scale="1.6 0.7 1"
        color="#8B4513"
      ></a-box>

      <a-box
        id="chestLid"
        position="0 0.85 0"
        scale="1.7 0.35 1.05"
        color="#B06A2B"
      ></a-box>

      <a-box
        position="0 0.98 -0.55"
        scale="1.85 0.12 0.08"
        color="#FFD75A"
      ></a-box>

      <a-box
        position="0 0.45 -0.55"
        scale="1.85 0.12 0.08"
        color="#FFD75A"
      ></a-box>

      <a-box
        position="0 0.62 -0.62"
        scale="0.25 0.32 0.08"
        color="#222222"
      ></a-box>

      <a-sphere
        id="treasureStar"
        position="0 1.55 0"
        radius="0.2"
        color="#fff176"
        visible="false"
        animation="property: position; from: 0 1.45 0; to: 0 2.1 0; dir: alternate; loop: true; dur: 900; easing: easeInOutSine;"
      ></a-sphere>

      <a-ring
        id="treasureRing"
        position="0 1.55 0"
        rotation="90 0 0"
        radius-inner="0.28"
        radius-outer="0.34"
        color="#ffffff"
        visible="false"
        animation="property: rotation; to: 90 0 360; loop: true; dur: 1400; easing: linear;"
      ></a-ring>
    </a-entity>

    <!-- 説明看板 -->
    <a-entity position="0 1.2 2">
      <a-plane width="4.5" height="1.4" color="#222" opacity="0.78"></a-plane>
      <a-text
        value="Move forward and find the treasure!"
        position="0 0.18 0.02"
        align="center"
        color="#ffffff"
        width="4"
      ></a-text>
      <a-text
        value="宝箱に近づいて「開ける」"
        position="0 -0.28 0.02"
        align="center"
        color="#ffe066"
        width="4"
      ></a-text>
    </a-entity>

  </a-scene>

  <script>
    const player = document.getElementById("player");
    const camera = document.getElementById("camera");
    const treasure = document.getElementById("treasure");
    const chestLid = document.getElementById("chestLid");
    const treasureStar = document.getElementById("treasureStar");
    const treasureRing = document.getElementById("treasureRing");

    const forwardBtn = document.getElementById("forwardBtn");
    const backBtn = document.getElementById("backBtn");
    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");
    const jumpBtn = document.getElementById("jumpBtn");
    const openBtn = document.getElementById("openBtn");

    let isOpen = false;
    let moving = {
      forward: false,
      back: false,
      left: false,
      right: false
    };

    function getYaw() {
      const rot = camera.getAttribute("rotation");
      return THREE.MathUtils.degToRad(rot.y);
    }

    function movePlayer(direction, amount) {
      const pos = player.getAttribute("position");
      const yaw = getYaw();

      let dx = 0;
      let dz = 0;

      if (direction === "forward") {
        dx = -Math.sin(yaw) * amount;
        dz = -Math.cos(yaw) * amount;
      }

      if (direction === "back") {
        dx = Math.sin(yaw) * amount;
        dz = Math.cos(yaw) * amount;
      }

      if (direction === "left") {
        dx = -Math.cos(yaw) * amount;
        dz = Math.sin(yaw) * amount;
      }

      if (direction === "right") {
        dx = Math.cos(yaw) * amount;
        dz = -Math.sin(yaw) * amount;
      }

      player.setAttribute("position", {
        x: pos.x + dx,
        y: pos.y,
        z: pos.z + dz
      });
    }

    function distanceToTreasure() {
      const p = player.getAttribute("position");
      const t = treasure.getAttribute("position");

      const dx = p.x - t.x;
      const dz = p.z - t.z;

      return Math.sqrt(dx * dx + dz * dz);
    }

    function openTreasure() {
      const dist = distanceToTreasure();

      if (dist > 4) {
        alert("宝箱が遠い！もう少し近づいてください。");
        return;
      }

      if (isOpen) {
        alert("もう宝箱は開いています！");
        return;
      }

      isOpen = true;

      chestLid.setAttribute("animation", {
        property: "rotation",
        to: "-55 0 0",
        dur: 600,
        easing: "easeOutQuad"
      });

      treasureStar.setAttribute("visible", "true");
      treasureRing.setAttribute("visible", "true");

      alert("宝箱オープン！Soraの星を発見！");
    }

    function jump() {
      const pos = player.getAttribute("position");

      player.setAttribute("animation__jumpup", {
        property: "position",
        to: `${pos.x} 2.2 ${pos.z}`,
        dur: 220,
        easing: "easeOutQuad"
      });

      setTimeout(() => {
        const now = player.getAttribute("position");
        player.setAttribute("animation__jumpdown", {
          property: "position",
          to: `${now.x} 1.6 ${now.z}`,
          dur: 260,
          easing: "easeInQuad"
        });
      }, 230);
    }

    function bindHoldButton(btn, key) {
      btn.addEventListener("mousedown", () => moving[key] = true);
      btn.addEventListener("mouseup", () => moving[key] = false);
      btn.addEventListener("mouseleave", () => moving[key] = false);

      btn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        moving[key] = true;
      }, { passive: false });

      btn.addEventListener("touchend", (e) => {
        e.preventDefault();
        moving[key] = false;
      }, { passive: false });
    }

    bindHoldButton(forwardBtn, "forward");
    bindHoldButton(backBtn, "back");
    bindHoldButton(leftBtn, "left");
    bindHoldButton(rightBtn, "right");

    jumpBtn.addEventListener("click", jump);
    jumpBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      jump();
    }, { passive: false });

    openBtn.addEventListener("click", openTreasure);
    openBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      openTreasure();
    }, { passive: false });

    treasure.addEventListener("click", openTreasure);

    function gameLoop() {
      const speed = 0.08;

      if (moving.forward) movePlayer("forward", speed);
      if (moving.back) movePlayer("back", speed);
      if (moving.left) movePlayer("left", speed);
      if (moving.right) movePlayer("right", speed);

      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
