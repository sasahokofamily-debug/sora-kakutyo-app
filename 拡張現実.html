<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡単WebAR</title>
    <!-- A-Frame (3D描画用ライブラリ) の読み込み -->
    <script src="https://aframe.io"></script>
    <!-- AR.js (ARトラッキング用ライブラリ) の読み込み -->
    <script src="https://githack.com"></script>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- ARを表示するシーンの定義（カメラ連携を有効化） -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <!-- マーカーの定義（標準の「Hiroマーカー」を使用） -->
        <a-marker preset="hiro">
            <!-- マーカーの上に表示する3Dオブジェクト（赤色の立方体） -->
            <a-box position="0 0.5 0" material="color: red;" animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-box>
        </a-marker>

        <!-- ユーザーの目線となるカメラ -->
        

    </a-scene>

</body>
</html>
